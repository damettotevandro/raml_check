<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defender no Pré-Comitê PROD</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="print-footer" style="display: none;">
        <img src="https://www.clipartmax.com/png/middle/200-2008231_mulesoft-logo-299c-stacked-feedyeti-mulesoft-logo.png"
            alt="MuleSoft Logo" style="height: 45px; opacity: 0.8;">
    </div>
    <div class="container">
        <header>
            <nav class="top-nav">
                <a href="index.html">Conversor & Validador</a>
                <a href="documentacao.html">Documentação</a>
                <a href="defender.html" class="active">Pré-Comitê PROD</a>
            </nav>
        </header>

        <main>
            <div class="panel" style="padding: 2rem;">
                <h2 style="color: var(--accent); margin-bottom: 1.5rem;">O que validar antes da reunião</h2>

                <ul
                    style="list-style: none; padding: 0; color: var(--text-secondary); display: flex; flex-direction: column; gap: 1rem;">
                    <li
                        style="background-color: rgba(255,255,255,0.02); padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                        <strong style="color: white; display: block; margin-bottom: 1rem;">1. Mexeu no RAML?</strong>
                        <div style="margin-bottom: 0.5rem;">
                            <label style="margin-right: 1rem; cursor: pointer; color: var(--text-primary);">
                                <input type="radio" name="raml_changed" value="sim" onchange="toggleRamlDetails(true)">
                                Sim
                            </label>
                            <label style="cursor: pointer; color: var(--text-primary);">
                                <input type="radio" name="raml_changed" value="nao" onchange="toggleRamlDetails(false)"
                                    checked> Não
                            </label>
                        </div>
                        <div id="raml-details-container" style="display: none; margin-top: 1rem;">
                            <label
                                style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem;">Descreva
                                todas as mudanças realizadas no RAML:</label>
                            <textarea id="raml-details"
                                placeholder="Ex: Adicionado novo endpoint /users, alterado tipo de response..."
                                style="width: 100%; min-height: 100px; padding: 0.75rem; border-radius: 0.5rem; background-color: #0f172a; color: white; border: 1px solid var(--border-color); outline: none; resize: vertical; font-family: 'Inter', sans-serif;"></textarea>
                        </div>
                    </li>
                    <li
                        style="background-color: rgba(255,255,255,0.02); padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                        <strong style="color: white; display: block; margin-bottom: 1rem;">2. Mudou algo na Arquitetura
                            ou Diagrama de Sequência?</strong>
                        <div style="margin-bottom: 0.5rem;">
                            <label style="margin-right: 1rem; cursor: pointer; color: var(--text-primary);">
                                <input type="radio" name="arch_changed" value="sim" onchange="toggleArchDetails(true)">
                                Sim
                            </label>
                            <label style="cursor: pointer; color: var(--text-primary);">
                                <input type="radio" name="arch_changed" value="nao" onchange="toggleArchDetails(false)"
                                    checked> Não
                            </label>
                        </div>
                        <div id="arch-details-container" style="display: none; margin-top: 1rem;">
                            <label
                                style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem;">Descreva
                                todas as mudanças realizadas na Arquitetura ou no Fluxo:</label>
                            <textarea id="arch-details"
                                placeholder="Ex: Adicionado nova chamada para SAPI Salesforce, alterado fluxo de orquestração..."
                                style="width: 100%; min-height: 100px; padding: 0.75rem; border-radius: 0.5rem; background-color: #0f172a; color: white; border: 1px solid var(--border-color); outline: none; resize: vertical; font-family: 'Inter', sans-serif;"></textarea>
                        </div>
                    </li>
                    <li
                        style="background-color: rgba(255,255,255,0.02); padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                        <strong style="color: white; display: block; margin-bottom: 1rem;">3. O que foi
                            desenvolvimento?</strong>
                        <div id="sec-details-container" style="margin-top: 0.5rem;">
                            <textarea id="sec-details"
                                placeholder="Ex: Foi desenvolvida a integração com o Salesforce, criado fluxo de orquestração X, e aplicadas políticas de segurança..."
                                style="width: 100%; min-height: 100px; padding: 0.75rem; border-radius: 0.5rem; background-color: #0f172a; color: white; border: 1px solid var(--border-color); outline: none; resize: vertical; font-family: 'Inter', sans-serif;"></textarea>
                        </div>
                    </li>
                    <li id="test-item"
                        style="background-color: rgba(255,255,255,0.02); padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--border-color);">
                        <strong style="color: white; display: block; margin-bottom: 1rem;">4. Testes</strong>
                        <div style="margin-bottom: 1rem;">
                            <label
                                style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem;">Anexe
                                evidências (imagens) da cobertura de testes:</label>
                            <input type="file" id="test-image-upload" accept="image/*" multiple
                                style="color: var(--text-primary); font-size: 0.85rem; font-family: 'Inter', sans-serif;"
                                onchange="previewTestImage(event)">
                        </div>
                        <div id="test-image-preview-container"
                            style="display: none; margin-top: 1rem; text-align: center;">
                            <div id="test-image-list" style="display: flex; flex-direction: column; gap: 1rem; align-items: center;"></div>
                            <button type="button" onclick="removeTestImage()"
                                style="display: block; margin: 0.5rem auto 0; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.85rem; text-decoration: underline;">Remover
                                Imagens</button>
                        </div>
                    </li>
                </ul>

                <div class="actions"
                    style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; text-align: center;">
                    <button type="button" class="primary-btn" onclick="window.print()"
                        style="background-color: var(--accent); color: white; border: none; padding: 0.75rem 2rem; font-size: 1rem; font-weight: 600; border-radius: 0.5rem; cursor: pointer;">
                        Imprimir / Salvar em PDF
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script>
        function toggleRamlDetails(show) {
            const container = document.getElementById('raml-details-container');
            if (show) {
                container.style.display = 'block';
                document.getElementById('raml-details').focus();
            } else {
                container.style.display = 'none';
            }
        }

        function toggleArchDetails(show) {
            const container = document.getElementById('arch-details-container');
            if (show) {
                container.style.display = 'block';
                document.getElementById('arch-details').focus();
            } else {
                container.style.display = 'none';
            }
        }

        function previewTestImage(event) {
            const input = event.target;
            const container = document.getElementById('test-image-preview-container');
            const list = document.getElementById('test-image-list');
            const testItem = document.getElementById('test-item');

            list.innerHTML = '';

            if (input.files && input.files.length > 0) {
                Array.from(input.files).forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.alt = "Evidência de Testes";
                            img.style.maxWidth = "100%";
                            img.style.maxHeight = "400px";
                            img.style.borderRadius = "0.5rem";
                            img.style.border = "1px solid var(--border-color)";
                            list.appendChild(img);
                        }
                        reader.readAsDataURL(file);
                    }
                });
                container.style.display = 'block';
                testItem.classList.add('has-images');
            } else {
                testItem.classList.remove('has-images');
            }
        }

        function removeTestImage() {
            document.getElementById('test-image-upload').value = '';
            document.getElementById('test-image-list').innerHTML = '';
            document.getElementById('test-image-preview-container').style.display = 'none';
            document.getElementById('test-item').classList.remove('has-images');
        }

        // Função para identificar e formatar código e JSON no texto
        function formatTextToHTML(text) {
            // Escapa HTML para não quebrar a página
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Detecta padrões JSON como "chave": "valor" e formata como código
            html = html.replace(/"([^"]+)"\s*:\s*("[^"]*"|[0-9]+|true|false|null)/g, function(match) {
                return `<code style="font-family: Consolas, monospace; background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #db2777; font-size: 0.9em; border: 1px solid #e2e8f0;">${match}</code>`;
            });

            // Detecta texto entre crases (markdown genérico para código)
            html = html.replace(/`([^`]+)`/g, function(match, p1) {
                return `<code style="font-family: Consolas, monospace; background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #db2777; font-size: 0.9em; border: 1px solid #e2e8f0;">${p1}</code>`;
            });
            
            return html;
        }

        // Antes de imprimir: esconde o textarea e cria uma div com o texto formatado e com altura dinâmica
        window.addEventListener('beforeprint', () => {
            document.querySelectorAll('textarea').forEach(ta => {
                ta.style.display = 'none'; // esconde o campo original
                
                const div = document.createElement('div');
                div.className = 'print-textarea-replacement';
                div.style.width = '100%';
                div.style.minHeight = ta.style.minHeight || '100px';
                div.style.padding = '0.75rem';
                div.style.borderRadius = '0.5rem';
                div.style.border = '1px solid #cbd5e1'; 
                div.style.color = '#000';
                div.style.fontFamily = "'Inter', sans-serif";
                div.style.whiteSpace = 'pre-wrap';
                div.style.wordBreak = 'break-word';
                
                div.innerHTML = formatTextToHTML(ta.value);
                
                ta.parentNode.insertBefore(div, ta.nextSibling);
            });
        });

        // Depois de imprimir: remove a div e volta a mostrar o textarea normal
        window.addEventListener('afterprint', () => {
            document.querySelectorAll('textarea').forEach(ta => {
                ta.style.display = ''; 
            });
            document.querySelectorAll('.print-textarea-replacement').forEach(div => {
                div.remove();
            });
        });
    </script>
</body>
</html>
